name: Plant Disease Detection CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt file found"
            exit 1
          fi

      - name: Validate Required Libraries
        run: |
          python - <<EOF
          import streamlit
          import tensorflow as tf
          import numpy
          import pandas
          import sklearn
          import cv2
          from PIL import Image

          print("Streamlit version:", streamlit.__version__)
          print("TensorFlow version:", tf.__version__)
          print("All required libraries loaded successfully!")
          EOF

      - name: Run Python Syntax Check
        run: |
          find . -name "*.py" -exec python -m py_compile {} \;

      - name: Check Important Project Files
        run: |
          echo "Checking important files..."

          if [ -f app.py ] || [ -f app1.py ]; then
            echo "App file found"
          else
            echo "No app.py or app1.py found"
            exit 1
          fi

          if [ -f utils.py ]; then
            echo "utils.py found"
          else
            echo "utils.py not found"
          fi

      - name: Check Model File (Optional)
        run: |
          if [ -f trained_disease_model.h5 ]; then
            echo "Model file found"
          else
            echo "Model file not present in repo (optional)"
          fi

      - name: CI Completed
        run: echo "Plant Disease Detection workflow completed successfully!"
